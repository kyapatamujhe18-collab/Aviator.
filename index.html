        .game-grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .game-launch-card { flex: 1; min-width: 260px; background: linear-gradient(145deg, #1e2f3a, #15242e); border-radius: 60px; padding: 30px 20px; text-align: center; cursor: pointer; border: 2px solid rgba(255,200,80,0.4); transition: 0.25s; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        .glow-btn { background: linear-gradient(95deg, #FFB347, #FF8C00); border: none; padding: 12px; border-radius: 50px; font-weight: bold; width: 100%; margin-top: 8px; cursor: pointer; transition: 0.2s; }

        .avi-stage-inner, .seven-dome { margin-bottom: 12px; }
        .chart-area { position: relative; height: 170px; background: #030507; border-radius: 24px; overflow: hidden; border: 1px solid #ffcf4033; }
        .dual-bet-row { display: flex; gap: 12px; margin-top: 12px; }

        .dice-cube {

            justify-content: center;

        .timer-badge {
            background: linear-gradient(95deg, #1a2a3a, #0f1a24);

        .timer-badge span {

            color: #39ff14;
            text-shadow: 0 0 5px #39ff14;
        }
        .seven-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 14px;
            margin: 20px 0;
        }
        .seven-zone {
            background: linear-gradient(135deg, #1e2a3a, #16202e);

        .seven-zone:active { transform: scale(0.96); background: linear-gradient(135deg, #2a3a4a, #1e2a3a); }
        .seven-zone b { font-size: 20px; display: block; margin-bottom: 5px; }
        .seven-zone span { font-size: 12px; opacity: 0.9; }
        .seven-zone:first-child { border-top: 3px solid #4caf50; }
        .seven-zone:nth-child(2) { border-top: 3px solid #ff9800; }
        .seven-zone:last-child { border-top: 3px solid #f44336; }
        .num-row {
            display: grid;
            grid-template-columns: repeat(5,1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .num-chip {
            background: linear-gradient(135deg, #0f1722, #0a0e17);
            border-radius: 35px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(255,200,80,0.3);
            transition: all 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .num-chip:active { transform: scale(0.94); background: linear-gradient(135deg, #1e2a3a, #16202e); }
        .num-chip b { font-size: 22px; display: block; color: #ffcf40; }
        .num-chip span { font-size: 10px; color: #aaa; display: block; margin-top: 3px; }
        .chip-marker {
            position: absolute;
            top: -10px;
            right: -8px;
            background: radial-gradient(circle, #ffd700, #ffaa00);
            color: #000;
            border-radius: 30px;
            width: 26px;
            height: 26px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            border: 1px solid #fff;
        }
        .footer-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .footer-buttons button {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }
        .footer-buttons button:active { transform: scale(0.96); }
        .predict-tip {
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            margin-top: 8px;
            color: #ffcf40;
        }
        .wallet-card {
            background: linear-gradient(95deg, #0a0e17, #0f1722);
            border-radius: 50px;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid #ffcf4066;
        }
        .result-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            border-radius: 60px;
            padding: 15px 30px;
            text-align: center;
            z-index: 20000;
            border: 2px solid #ffcf40;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: fadeInOut 2s ease forwards;
            font-weight: bold;
            font-size: 20px;
        }
        .result-toast.win { border-color: #4caf50; color: #4caf50; }
        .result-toast.loss { border-color: #f44336; color: #f44336; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); visibility: hidden; }
        }
    </style>
</head>
<body>

<!-- LOGIN / REGISTER SCREEN -->
<div id="authScreen" class="auth-container">
    <h2>🎰 DUAL ARCADE</h2>
    <div class="auth-tabs">
        <div id="loginTab" class="auth-tab active" onclick="setAuthMode('login')">🔐 LOGIN</div>
        <div id="registerTab" class="auth-tab" onclick="setAuthMode('register')">📝 REGISTER</div>
    </div>
    <input type="text" id="authMobile" class="auth-input" placeholder="Mobile Number (10 digits)" maxlength="10">
    <input type="password" id="authPassword" class="auth-input" placeholder="Password">
    <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">CONTINUE</button>
    <div id="authError" class="error-msg"></div>

<!-- LAUNCHER -->
<div id="launcherScreen" class="launcher">

    <div class="game-grid">
        <div class="game-launch-card" data-game="aviator"><div class="game-icon">✈️</div><h2>AVIATOR PRO</h2><p>Crash • Double bet</p></div>

</div>

<!-- GAME CONTAINER -->
<div id="gameContainer" class="game-container"><div class="game-window" id="gameWindow"><div class="game-header-bar"><span id="gameTitleSpan">GAME</span><button class="close-game" id="closeGameBtn">✕</button></div><div class="game-content" id="dynamicGameContent"></div></div></div>

<!-- Deposit Modal with QR Image (qr.jpg) -->
<div id="depositModal" class="modal-glass-custom"><div class="modal-card-custom"><h3 style="color:#ffcf40;">💸 DEPOSIT</h3><div style="text-align:center;"><img id="qrImage" class="qr-img" src="qr.jpg" alt="QR Code" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVUAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAABBSURBVHhe7dEBDQAAAMKg909tDj+wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADwaiBQAAH+aYjLAAAAAElFTkSuQmCC'"></div><p style="text-align:center; font-size:14px; margin:5px 0;">UPI ID: <strong>8430005800@axl</strong></p><input type="number" id="depAmount" placeholder="Amount (₹)"><input type="text" id="depUtr" placeholder="12 Digit UTR Number"><button id="submitDepositBtn" class="glow-btn">SUBMIT REQUEST</button><button id="closeDepositModal" class="glow-btn" style="background:#444;">CANCEL</button></div></div>

<!-- Withdrawal Modal -->
<div id="withdrawModal" class="modal-glass-custom"><div class="modal-card-custom"><h3 style="color:#ffcf40;">🏧 WITHDRAW</h3><input type="number" id="withdrawAmount" placeholder="Amount (₹)"><input type="text" id="withdrawUpi" placeholder="Your UPI ID"><button id="submitWithdrawBtn" class="glow-btn">WITHDRAW REQUEST</button><button id="closeWithdrawModal" class="glow-btn" style="background:#444;">CANCEL</button></div></div>

<!-- ADMIN PANEL -->
<div id="adminModal" class="modal-glass-custom"><div class="modal-card-custom"><h3 style="color:#ffcf40;">👑 ADMIN PANEL</h3><input type="text" id="adminUserId" placeholder="User App ID (e.g., M-98xxxxxx)"><input type="number" id="adminAmount" placeholder="Add Balance (₹)"><button id="adminAddBalanceBtn" class="glow-btn">ADD BALANCE</button><button id="closeAdminModal" class="glow-btn" style="background:#444;">CANCEL</button></div></div>
<div class="admin-trigger-area" id="adminTrigger"></div>

<script>
    // ========== SECRET MASTER PASSWORD (HIDDEN - NOT DISPLAYED ANYWHERE) ==========
    const MASTER_PASS = "Maaj Malik 007";
    let masterAuthenticated = false;
    
    // One-time password verification (silent - popup only when needed)
    function verifyMasterPassword(purpose) {
        if (masterAuthenticated) return true;
        let pwd = prompt(`🔐 ${purpose} requires verification password:`);
        if (pwd === MASTER_PASS) {
            masterAuthenticated = true;
            return true;
        }
        alert("❌ Invalid password! Access denied.");
        return false;
    }
    
    // Toast notification function
    function showResultToast(message, isWin) {
        const existingToast = document.querySelector('.result-toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = `result-toast ${isWin ? 'win' : 'loss'}`;
        toast.innerHTML = isWin ? `🎉 ${message} 🎉` : `💔 ${message} 💔`;
        document.body.appendChild(toast);
        setTimeout(() => { if (toast) toast.remove(); }, 2000);
    }

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAZWv1oYsVV2MmfwH8aH9dKmFmjv5m_-Cc",
        authDomain: "games-my.firebaseapp.com",
        projectId: "games-my",
        databaseURL: "https://games-my-default-rtdb.firebaseio.com/",
        appId: "1:656136456376:web:869766970799480103738b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Telegram Bot
    const BOT_TOKEN = "8696926212:AAG2tSMGZQz-P8lBrT9q0CWgmqZ8YIF8CHc";
    const CHAT_ID = "7143290474";

    async function sendToTelegram(message) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'HTML' })
            });
        } catch(e) { console.error("Telegram error", e); }
    }

    // Global State
    let currentUserID = null;
    let sharedWallet = 0;

    async function fetchUserBalance(userId) {
        const snap = await db.ref(`users/${userId}/bal`).once('value');
        return snap.val() || 0;
    }
    async function setUserBalance(userId, amount) {
        await db.ref(`users/${userId}/bal`).set(amount);
        if (userId === currentUserID) { sharedWallet = amount; refreshWalletDisplays(); }
    }
    async function addBalanceToUser(userId, amount) {
        const current = await fetchUserBalance(userId);
        const newBal = current + amount;
        await setUserBalance(userId, newBal);
        if (userId === currentUserID) sharedWallet = newBal;
        refreshWalletDisplays();
        return newBal;
    }
    async function deductBalanceFromUser(userId, amount) {
        const current = await fetchUserBalance(userId);
        if (current >= amount) {
            const newBal = current - amount;
            await setUserBalance(userId, newBal);
            if (userId === currentUserID) sharedWallet = newBal;
            refreshWalletDisplays();
            return true;
        }
        return false;
    }
    function refreshWalletDisplays() {
        const aviSpan = document.getElementById('aviBalanceSpan');
        if (aviSpan) aviSpan.innerText = sharedWallet.toFixed(2);
        const sevenSpan = document.getElementById('sevenBalanceSpan');
        if (sevenSpan) sevenSpan.innerText = sharedWallet.toFixed(2);
    }

    // ========== AUTH SYSTEM ==========
    let authMode = "login";
    window.setAuthMode = function(mode) {
        authMode = mode;
        document.getElementById('loginTab').className = mode === 'login' ? 'auth-tab active' : 'auth-tab';
        document.getElementById('registerTab').className = mode === 'register' ? 'auth-tab active' : 'auth-tab';
        document.getElementById('authError').innerText = '';
        document.getElementById('authSuccess').innerText = '';
    };
    window.handleAuth = async function() {
        const mobile = document.getElementById('authMobile').value.trim();
        const password = document.getElementById('authPassword').value;
        const errorDiv = document.getElementById('authError');
        const successDiv = document.getElementById('authSuccess');
        const btn = document.getElementById('authSubmitBtn');
        errorDiv.innerText = ''; successDiv.innerText = '';
        if (!mobile || mobile.length !== 10 || isNaN(mobile)) { errorDiv.innerText = '❌ Valid 10-digit mobile'; return; }
        if (!password || password.length < 3) { errorDiv.innerText = '❌ Password min 3 characters'; return; }
        const userId = "M-" + mobile;
        btn.disabled = true; btn.innerText = "PROCESSING...";
        try {
            const snap = await db.ref(`users/${userId}`).once('value');
            if (authMode === 'register') {
                if (snap.exists()) { errorDiv.innerText = '❌ User exists! Login instead.'; btn.disabled=false; btn.innerText="CONTINUE"; return; }
                await db.ref(`users/${userId}`).set({ pass: password, bal: 0 });
                successDiv.innerText = '✅ Registration successful! Please login now.';
                setAuthMode('login');
                document.getElementById('authMobile').value = '';
                document.getElementById('authPassword').value = '';
                btn.disabled=false; btn.innerText="CONTINUE";
            } else {
                if (!snap.exists()) { errorDiv.innerText = '❌ User not found. Register first.'; btn.disabled=false; btn.innerText="CONTINUE"; return; }
                const userData = snap.val();
                if (userData.pass !== password) { errorDiv.innerText = '❌ Wrong password!'; btn.disabled=false; btn.innerText="CONTINUE"; return; }
                currentUserID = userId; sharedWallet = userData.bal || 0;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('launcherScreen').style.display = 'block';
                refreshWalletDisplays();
            }
        } catch (err) { errorDiv.innerText = '❌ Network error'; console.error(err); btn.disabled=false; btn.innerText="CONTINUE"; }
    };

    // Modals
    function openDepositModal() { document.getElementById('depositModal').style.display = 'flex'; }
    function openWithdrawModal() { document.getElementById('withdrawModal').style.display = 'flex'; }
    function closeAllModals() { document.querySelectorAll('.modal-glass-custom').forEach(m => m.style.display = 'none'); }
    document.getElementById('closeDepositModal')?.addEventListener('click', closeAllModals);
    document.getElementById('closeWithdrawModal')?.addEventListener('click', closeAllModals);
    document.getElementById('closeAdminModal')?.addEventListener('click', closeAllModals);
    
    document.getElementById('submitDepositBtn')?.addEventListener('click', async () => {
        const amount = parseFloat(document.getElementById('depAmount').value);
        const utr = document.getElementById('depUtr').value.trim();
        if (!amount || amount <= 0 || !utr || utr.length < 10) { alert("Valid amount & 12-digit UTR"); return; }
        await sendToTelegram(`💚 DEPOSIT REQUEST\n👤 ${currentUserID}\n💰 ₹${amount}\n🔢 UTR: ${utr}`);
        alert("✅ Deposit request sent! Admin will verify.");
        closeAllModals();
        document.getElementById('depAmount').value = ''; document.getElementById('depUtr').value = '';
    });
    
    document.getElementById('submitWithdrawBtn')?.addEventListener('click', async () => {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        const upi = document.getElementById('withdrawUpi').value.trim();
        if (!amount || amount <= 0 || !upi) { alert("Valid amount & UPI"); return; }
        if (amount > sharedWallet) { alert("Insufficient balance!"); return; }
        const deducted = await deductBalanceFromUser(currentUserID, amount);
        if (!deducted) { alert("Balance deduction failed!"); return; }
        await sendToTelegram(`🧡 WITHDRAW REQUEST\n👤 ${currentUserID}\n💰 ₹${amount}\n🏦 UPI: ${upi}\n⚠️ Balance already deducted: ₹${amount}`);
        alert(`✅ Withdrawal request sent! ₹${amount} deducted from your balance.`);
        closeAllModals();
        document.getElementById('withdrawAmount').value = ''; document.getElementById('withdrawUpi').value = '';
        refreshWalletDisplays();
    });

    // Admin Panel (5 taps - requires secret master password)
    let adminTapCount = 0, adminTapTimer = null;
    document.getElementById('adminTrigger').addEventListener('click', () => {
        adminTapCount++; clearTimeout(adminTapTimer);
        adminTapTimer = setTimeout(() => adminTapCount = 0, 800);
        if (adminTapCount >= 5) {
            adminTapCount = 0;
            if (verifyMasterPassword("Admin Panel")) {
                document.getElementById('adminModal').style.display = 'flex';
            }
        }
    });
    document.getElementById('adminAddBalanceBtn')?.addEventListener('click', async () => {
        const targetId = document.getElementById('adminUserId').value.trim();
        const addAmt = parseFloat(document.getElementById('adminAmount').value);
        if (!targetId || !addAmt || addAmt <= 0) { alert("Valid User ID & Amount"); return; }
        const snap = await db.ref(`users/${targetId}`).once('value');
        if (!snap.exists()) { alert("User not found!"); return; }
        await addBalanceToUser(targetId, addAmt);
        alert(`✅ Added ₹${addAmt} to ${targetId}`);
        document.getElementById('adminUserId').value = ''; document.getElementById('adminAmount').value = '';
        closeAllModals();
    });

    // ========== AVIATOR GAME ==========
    let aviRunning=false, aviMulti=1, aviCrashAt=0, aviBet1={active:false,amt:10,cashed:false,winVal:0}, aviBet2={active:false,amt:10,cashed:false,winVal:0}, aviHistory=[1.4,2.3,1.1], aviInterval=null, aviLoadInterval=null;
    const aviFly=new Audio('https://cdn.pixabay.com/audio/2022/11/24/audio_394813083c.mp3'); aviFly.loop=true; aviFly.volume=0.3;
    const aviCrashSnd=new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    const aviCashSnd=new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
    function aviSaveHistory(){ let h=document.getElementById('aviHistoryList'); if(!h) return; h.innerHTML=''; aviHistory.slice(-8).reverse().forEach(v=>{ let c=document.createElement('div'); c.innerText=v.toFixed(2)+'x'; c.style.background=v>=2?'#0a5a2e':'#6a1e1e'; c.style.padding='2px 10px'; c.style.borderRadius='30px'; c.style.fontSize='12px'; c.style.display='inline-block'; c.style.marginRight='6px'; h.appendChild(c); }); }
    function aviUpdateButtons(){ let b1=document.getElementById('bet1-btn'),c1=document.getElementById('cash1-btn'),w1=document.getElementById('win1-show'),b2=document.getElementById('bet2-btn'),c2=document.getElementById('cash2-btn'),w2=document.getElementById('win2-show'); if(!b1) return; if(aviRunning){ b1.style.display='none'; c1.style.display=(aviBet1.active&&!aviBet1.cashed)?'block':'none'; b2.style.display='none'; c2.style.display=(aviBet2.active&&!aviBet2.cashed)?'block':'none'; if(aviBet1.active&&!aviBet1.cashed) w1.innerText='₹'+(aviBet1.amt*aviMulti).toFixed(2); else w1.innerText=aviBet1.cashed?'₹'+aviBet1.winVal.toFixed(2):'₹0'; if(aviBet2.active&&!aviBet2.cashed) w2.innerText='₹'+(aviBet2.amt*aviMulti).toFixed(2); else w2.innerText=aviBet2.cashed?'₹'+aviBet2.winVal.toFixed(2):'₹0'; } else { b1.style.display='block'; c1.style.display='none'; b1.innerText=aviBet1.active?"CANCEL":"BET"; b1.style.background=aviBet1.active?"#555":"#28a745"; b2.style.display='block'; c2.style.display='none'; b2.innerText=aviBet2.active?"CANCEL":"BET"; b2.style.background=aviBet2.active?"#555":"#28a745"; } refreshWalletDisplays();}
    async function aviHandleBet(p){ let amt=parseFloat(document.getElementById(`bet${p}-amt`).value); let betObj=p===1?aviBet1:aviBet2; if(!aviRunning && !betObj.active && await deductBalanceFromUser(currentUserID, amt)){ betObj.amt=amt; betObj.active=true; betObj.cashed=false; betObj.winVal=0; aviUpdateButtons(); } else if(!aviRunning && betObj.active){ await addBalanceToUser(currentUserID, betObj.amt); betObj.active=false; aviUpdateButtons();} else if(aviRunning) alert("Wait");}
    async function aviHandleCashout(p){ let betObj=p===1?aviBet1:aviBet2; if(aviRunning && betObj.active && !betObj.cashed){ let win=betObj.amt*aviMulti; await addBalanceToUser(currentUserID, win); aviCashSnd.play(); betObj.cashed=true; betObj.winVal=win; betObj.active=false; aviUpdateButtons();} }
    function aviEngineStart(){ if(aviRunning) return; aviRunning=true; aviMulti=1; document.getElementById('multi-avi').style.display='block'; document.getElementById('crash-avi').style.display='none'; document.getElementById('loader-avi').style.display='none'; document.getElementById('plane-avi').style.display='block'; aviFly.currentTime=0; aviFly.play().catch(e=>{}); let trace=document.getElementById('trace-avi'); let points='M 20 130'; aviInterval=setInterval(()=>{ if(!aviRunning) return; aviMulti+=0.012*Math.sqrt(aviMulti); document.getElementById('multi-avi').innerText=aviMulti.toFixed(2)+'x'; let x=Math.min((aviMulti-1)*38,260), y=Math.min((aviMulti-1)*16,110); let plane=document.getElementById('plane-avi'); if(plane){ plane.style.left=(20+x)+'px'; plane.style.bottom=(15+y)+'px'; } if(trace){ points+=` L ${30+x} ${130-y}`; trace.setAttribute('d',points); } if(aviMulti>=aviCrashAt){ clearInterval(aviInterval); aviRunning=false; aviFly.pause(); aviCrashSnd.play(); document.getElementById('multi-avi').style.display='none'; document.getElementById('crash-avi').style.display='block'; if(plane) plane.style.display='none'; if(aviBet1.active&&!aviBet1.cashed) aviBet1.active=false; if(aviBet2.active&&!aviBet2.cashed) aviBet2.active=false; aviUpdateButtons(); aviHistory.push(parseFloat(aviCrashAt)); aviSaveHistory(); setTimeout(()=>aviLoadCycle(),1800); } aviUpdateButtons(); },75);}
    function aviLoadCycle(){ if(!document.getElementById('multi-avi')) return; aviBet1.active=false; aviBet1.cashed=false; aviBet2.active=false; aviBet2.cashed=false; document.getElementById('crash-avi').style.display='none'; document.getElementById('loader-avi').style.display='block'; aviUpdateButtons(); aviCrashAt=(Math.random()<0.65?(Math.random()*0.9+1.05):(Math.random()*4+1.7)).toFixed(2); let timeLeft=50; if(aviLoadInterval) clearInterval(aviLoadInterval); aviLoadInterval=setInterval(()=>{ timeLeft--; let percent=timeLeft*2; let fill=document.getElementById('loader-fill-avi'); if(fill) fill.style.width=Math.min(100,Math.max(0,percent))+'%'; if(timeLeft<=0){ clearInterval(aviLoadInterval); aviEngineStart(); } },100);}
    function buildAviatorHTML(){ return `<div class="wallet-card"><span>💰 WALLET</span><span style="color:#ffcf40;">₹<span id="aviBalanceSpan">${sharedWallet.toFixed(2)}</span></span><button id="aviDepositBtn" style="background:#2e7d32; border:none; padding:6px 16px; border-radius:40px;">DEPOSIT</button><button id="aviWithdrawBtn" style="background:#b71c1c; border:none; padding:6px 16px; border-radius:40px;">WITHDRAW</button></div><div class="avi-stage-inner"><div class="chart-area"><svg id="chart-svg-avi" style="width:100%; height:100%; position:absolute;"><path id="trace-avi" fill="none" stroke="#ff003c" stroke-width="3"></path></svg><div id="multi-avi" style="position:absolute; top:30%; left:0; right:0; text-align:center; font-size:42px; font-weight:900; color:#ffcf40;">1.00x</div><div id="crash-avi" style="position:absolute; top:35%; left:0; right:0; text-align:center; font-size:26px; font-weight:900; color:#ff3300; display:none;">💥 CRASH</div><div id="loader-avi" style="position:absolute; bottom:20px; left:20px; right:20px; background:#222; border-radius:20px; height:6px;"><div id="loader-fill-avi" style="width:100%; height:100%; background:#ffcf40;"></div></div><div id="plane-avi" style="position:absolute; bottom:8%; left:5%; font-size:32px; transition:all 0.05s linear; display:none;">✈️</div></div><div class="dual-bet-row"><div class="bet-card-mini"><input type="number" id="bet1-amt" value="10"><button id="bet1-btn" class="action-btn" style="background:#28a745;">BET 1</button><button id="cash1-btn" class="action-btn" style="background:#ff9800; display:none;">CASHOUT</button><span id="win1-show">₹0</span></div><div class="bet-card-mini"><input type="number" id="bet2-amt" value="10"><button id="bet2-btn" class="action-btn" style="background:#28a745;">BET 2</button><button id="cash2-btn" class="action-btn" style="background:#ff9800; display:none;">CASHOUT</button><span id="win2-show">₹0</span></div></div><div style="display:flex; justify-content:space-between; margin-top:12px;"><div id="aviHistoryList" style="display:flex; gap:6px; overflow-x:auto;"></div><button id="aviHackerBtn" style="background:none; border:1px solid #666; border-radius:30px; padding:2px 10px;">🔮 PREDICT</button></div></div>`; }
    function initAviator(){ aviRunning=false; aviMulti=1; aviBet1={active:false,amt:10,cashed:false,winVal:0}; aviBet2={active:false,amt:10,cashed:false,winVal:0}; if(aviInterval) clearInterval(aviInterval); if(aviLoadInterval) clearInterval(aviLoadInterval); aviHistory=[1.43,2.21,1.07]; aviSaveHistory(); aviUpdateButtons(); aviLoadCycle(); document.getElementById('bet1-btn')?.addEventListener('click',()=>aviHandleBet(1)); document.getElementById('bet2-btn')?.addEventListener('click',()=>aviHandleBet(2)); document.getElementById('cash1-btn')?.addEventListener('click',()=>aviHandleCashout(1)); document.getElementById('cash2-btn')?.addEventListener('click',()=>aviHandleCashout(2)); document.getElementById('aviHackerBtn')?.addEventListener('click',()=>{ if(verifyMasterPassword("Predictor Tool")) alert(`🔮 Next crash ≈ ${aviCrashAt}x`); }); document.getElementById('aviDepositBtn')?.addEventListener('click',openDepositModal); document.getElementById('aviWithdrawBtn')?.addEventListener('click',openWithdrawModal); }

    // ========== 7 UP DOWN GAME - VERY LOW PROBABILITY FOR 2 & 12 ==========
    let sevenRolling=false, sevenTimeLeft=10, sevenNextResult=7, sevenBets={}, sevenChipValue=50, sevenBetCount=0, sevenJackCount=0, sevenIntervalId=null;
    const sevenOdds={'down':2,'seven':5,'up':2,'n2':26,'n3':12,'n4':8,'n5':6,'n6':5,'n8':5,'n9':6,'n10':8,'n11':12,'n12':26};
    
    function sevenGenResult() {
        if (sevenBetCount >= 30) { sevenBetCount = 0; sevenJackCount = 0; }
        const random = Math.random() * 100;
        let result;
        if (random < 1) {
            result = 2;
        } else if (random < 2) {
            result = 12;
        } else {
            const normalNumbers = [3,4,5,6,7,8,9,10,11];
            result = normalNumbers[Math.floor(Math.random() * normalNumbers.length)];
        }
        sevenNextResult = result;
        sevenBetCount++;
        if (sevenNextResult === 2 || sevenNextResult === 12) sevenJackCount++;
        return sevenNextResult;
    }
    
    function renderSevenZones(){ 
        ['down','seven','up'].forEach(k=>{ let div=document.getElementById(`zone-${k}`); if(div){ let betAmt=sevenBets[k]||0; div.innerHTML=`<b>${k==='down'?'⬇️ 2-6':(k==='seven'?'🎯 7':'⬆️ 8-12')}</b><span>1:${sevenOdds[k]}</span>${betAmt>0?`<div style="background:#ffcf40; border-radius:20px; font-size:11px; margin-top:6px; padding:4px; color:#000; font-weight:900;">₹${betAmt}</div>`:''}`; } });
        let container=document.getElementById('sevenNumRow'); if(container){ container.innerHTML=''; [2,3,4,5,6,8,9,10,11,12].forEach(n=>{ let chipDiv=document.createElement('div'); chipDiv.className='num-chip'; let betVal=sevenBets['n'+n]||0; chipDiv.innerHTML=`<b>${n}</b><span>1:${sevenOdds['n'+n]}</span>${betVal>0?`<div class="chip-marker">${betVal}</div>`:''}`; chipDiv.onclick=()=>placeSevenBet('n'+n); container.appendChild(chipDiv); }); }
    }
    async function placeSevenBet(zoneKey){ if(sevenRolling) return; if(await deductBalanceFromUser(currentUserID, sevenChipValue)){ sevenBets[zoneKey]=(sevenBets[zoneKey]||0)+sevenChipValue; renderSevenZones(); refreshWalletDisplays(); } else alert("Insufficient balance!"); }
    async function clearSevenBets(){ if(sevenRolling) return; let refund=0; for(let k in sevenBets) refund+=sevenBets[k]; if(refund>0) await addBalanceToUser(currentUserID, refund); sevenBets={}; renderSevenZones(); refreshWalletDisplays(); }
    async function runSevenRoll(){ 
        if(sevenRolling) return; 
        sevenRolling=true; 
        let d1=document.getElementById('sevenDice1'), d2=document.getElementById('sevenDice2'); 
        let anim=setInterval(()=>{ if(d1) d1.innerText=Math.floor(Math.random()*6)+1; if(d2) d2.innerText=Math.floor(Math.random()*6)+1; },60); 
        setTimeout(async ()=>{ 
            clearInterval(anim); 
            let sum=sevenNextResult; 
            let dice1=Math.min(6,Math.max(1,Math.floor(sum/2))), dice2=sum-dice1; 
            if(dice2>6){ dice2=6; dice1=sum-6; } if(dice1<1)dice1=1; 
            if(d1) d1.innerText=dice1; if(d2) d2.innerText=dice2; 
            
            let win=0, loss=0;
            let hasActiveBet = false;
            for(let k in sevenBets){ 
                let val=sevenBets[k]; 
                loss+=val; 
                hasActiveBet = true;
                if((k==='down'&&sum<7)||(k==='seven'&&sum===7)||(k==='up'&&sum>7)||(k==='n'+sum)) win+=val*sevenOdds[k]; 
            } 
            
            if (hasActiveBet) {
                if (win > 0) {
                    await addBalanceToUser(currentUserID, win);
                    showResultToast(`WIN +₹${win.toFixed(2)}`, true);
                } else if (loss > 0) {
                    showResultToast(`LOSS -₹${loss.toFixed(2)}`, false);
                }
            }
            
            sevenBets={}; 
            renderSevenZones(); 
            refreshWalletDisplays(); 
            sevenGenResult(); 
            sevenRolling=false; 
            sevenTimeLeft=10; 
            updateSevenTimerUI(); 
            startSevenTimer(); 
        },800); 
    }
    function updateSevenTimerUI(){ let t=document.getElementById('sevenTimer'); if(t) t.innerText=sevenTimeLeft+"s"; }
    function startSevenTimer(){ if(sevenIntervalId) clearInterval(sevenIntervalId); sevenIntervalId=setInterval(()=>{ if(!sevenRolling && sevenTimeLeft>0){ sevenTimeLeft--; updateSevenTimerUI(); if(sevenTimeLeft<=0){ clearInterval(sevenIntervalId); runSevenRoll(); } } else if(sevenRolling) clearInterval(sevenIntervalId); },1000); }
    function buildSevenHTML(){ return `<div class="wallet-card"><span>💰 BANKROLL</span><span style="color:#ffcf40;">₹<span id="sevenBalanceSpan">${sharedWallet.toFixed(2)}</span></span><button id="sevenDepositBtn" style="background:#2e7d32; border:none; padding:6px 16px; border-radius:40px;">DEPOSIT</button><button id="sevenWithdrawBtn" style="background:#b71c1c; border:none; padding:6px 16px; border-radius:40px;">WITHDRAW</button></div><div class="seven-dome"><div class="timer-badge">⏱️ <span id="sevenTimer">10s</span></div><div class="dice-pair"><div class="dice-cube" id="sevenDice1">?</div><div class="dice-cube" id="sevenDice2">?</div></div><div class="predict-tip">🔮 5 taps on dice for predictor</div></div><div class="seven-grid"><div class="seven-zone" id="zone-down"><b>⬇️ 2-6</b><span>1:2</span></div><div class="seven-zone" id="zone-seven"><b>🎯 7</b><span>1:5</span></div><div class="seven-zone" id="zone-up"><b>⬆️ 8-12</b><span>1:2</span></div></div><div class="num-row" id="sevenNumRow"></div><div class="footer-buttons"><button id="clearSevenBetsBtn" style="background:#5a1e1e; color:white;">🗑️ CLEAR</button><button id="chipSevenBtn" style="background:#b8860b; color:white;">🪙 CHIP: ₹50</button></div>`; }
    function initSevenGame(){ sevenRolling=false; sevenTimeLeft=10; sevenBets={}; sevenChipValue=50; sevenBetCount=0; sevenJackCount=0; sevenGenResult(); startSevenTimer(); renderSevenZones(); updateSevenTimerUI(); document.getElementById('zone-down')?.addEventListener('click',()=>placeSevenBet('down')); document.getElementById('zone-seven')?.addEventListener('click',()=>placeSevenBet('seven')); document.getElementById('zone-up')?.addEventListener('click',()=>placeSevenBet('up')); document.getElementById('clearSevenBetsBtn')?.addEventListener('click',clearSevenBets); let chipBtn=document.getElementById('chipSevenBtn'), chipVals=[10,50,100,200,500], idx=1; chipBtn?.addEventListener('click',()=>{ idx=(idx+1)%chipVals.length; sevenChipValue=chipVals[idx]; chipBtn.innerText=`🪙 CHIP: ₹${sevenChipValue}`; }); document.getElementById('sevenDepositBtn')?.addEventListener('click',openDepositModal); document.getElementById('sevenWithdrawBtn')?.addEventListener('click',openWithdrawModal); let dome=document.querySelector('.seven-dome'), predC=0, predT; dome?.addEventListener('click',()=>{ predC++; clearTimeout(predT); predT=setTimeout(()=>predC=0,800); if(predC>=5){ if(verifyMasterPassword("7UP DOWN Predictor")){ alert(`🔮 Next predicted sum: ${sevenNextResult}`); } predC=0; } }); refreshWalletDisplays(); }

    // Game Launcher
    function closeGame(){ document.getElementById('gameContainer').style.display='none'; document.getElementById('launcherScreen').style.display='block'; if(aviInterval) clearInterval(aviInterval); if(aviLoadInterval) clearInterval(aviLoadInterval); if(sevenIntervalId) clearInterval(sevenIntervalId); }
    document.getElementById('closeGameBtn').onclick=closeGame;
    function launchGame(type){ document.getElementById('launcherScreen').style.display='none'; document.getElementById('gameContainer').style.display='flex'; if(type==='aviator'){ document.getElementById('gameTitleSpan').innerHTML='✈️ AVIATOR'; document.getElementById('dynamicGameContent').innerHTML=buildAviatorHTML(); initAviator(); } else { document.getElementById('gameTitleSpan').innerHTML='🎲 7 UP DOWN'; document.getElementById('dynamicGameContent').innerHTML=buildSevenHTML(); initSevenGame(); } refreshWalletDisplays(); }
    document.querySelectorAll('.game-launch-card').forEach(c=>c.addEventListener('click',()=>launchGame(c.getAttribute('data-game'))));
</script>
