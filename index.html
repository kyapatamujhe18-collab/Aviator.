<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Pro | Maaj Edition Final</title>
    <style>
        :root { --red: #ff003c; --bg: #000; --green: #28a745; --blue: #00f2ff; }
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; overflow: hidden; height: 100vh; }
        
        #audio-unlocker { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: var(--red); color: white; border: none; padding: 18px 45px; font-size: 20px; font-weight: 900; border-radius: 50px; cursor: pointer; }

        .app { width: 100%; max-width: 500px; height: 100vh; margin: auto; display: flex; flex-direction: column; position: relative; padding: 5px; }
        
        #hacker-tool { position: absolute; top: 110px; left: 15px; width: 130px; background: rgba(10, 10, 10, 0.98); border: 2px solid var(--blue); border-radius: 12px; z-index: 10000; padding: 10px; text-align: center; display: none; }

        .header { background: #1a1a1a; padding: 8px; border-radius: 10px; margin-bottom: 5px; }
        .logo-text { color: var(--red); font-weight: 900; font-style: italic; cursor: pointer; font-size: 16px; }
        .bal-val { color: #00ff88; font-weight: bold; border: 1px solid #333; padding: 4px 8px; border-radius: 15px; background: #000; font-size: 13px; }
        .history-bar { display: flex; gap: 4px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .h-item { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; background: #222; border: 1px solid #333; }

        /* Stage area adjusted for higher buttons */
        .stage { flex: 1.2; position: relative; background: #050505; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #222; margin-bottom: 120px; }
        #chart-svg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        #trace-path { fill: none; stroke: var(--red); stroke-width: 3; }
        .multi { font-size: 50px; font-weight: 900; z-index: 50; }
        #crash-msg { font-size: 30px; font-weight: 900; color: var(--red); display: none; z-index: 60; }
        #loader-container { position: absolute; top: 25%; width: 70%; display: none; flex-direction: column; align-items: center; z-index: 70; }
        .loader-bar-bg { width: 100%; height: 4px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        #loader-fill { width: 100%; height: 100%; background: var(--red); }
        .plane-wrap { position: absolute; bottom: 10%; left: 5%; z-index: 20; display: none; font-size: 40px; transition: all 0.1s linear; }

        /* Bet Panel Positioned EVEN Higher & LARGER */
        .dual-controls { position: absolute; bottom: 40px; width: calc(100% - 10px); display: flex; gap: 8px; padding: 12px; background: #111; border-radius: 15px; z-index: 200; border: 1px solid #333; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .bet-panel { flex: 1; background: #1c1c1c; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #444; }
        .btn-main { width: 100%; padding: 18px; border-radius: 10px; border: none; font-size: 20px; font-weight: 900; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-bet { background: var(--green); box-shadow: 0 5px 0 #155d27; }
        .btn-cash { background: #ff9800; display: none; box-shadow: 0 5px 0 #bf7100; }
        .bet-panel input { background: black; color: white; border: 1px solid #444; text-align: center; border-radius: 8px; width: 100%; padding: 10px; font-size: 18px; font-weight: bold; }

        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.96); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1a1a1a; width: 100%; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .f-in { width: 100%; padding: 10px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; margin: 8px 0; text-align: center; }
        .tab-btn { background: #333; color: white; border: none; padding: 8px; border-radius: 5px; margin: 5px; font-size: 12px; cursor: pointer; }
        .active-tab { background: var(--red); }
    </style>
</head>
<body>

<div id="audio-unlocker">
    <h1 style="color:var(--red); font-style:italic;">AVIATOR PRO</h1>
    <button class="start-btn" onclick="initGame()">START GAME</button>
</div>

<div class="app">
    <audio id="snd-fly" loop><source src="https://cdn.pixabay.com/audio/2022/11/24/audio_394813083c.mp3" type="audio/mpeg"></audio>
    <audio id="snd-crash"><source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg"></audio>
    <audio id="snd-cashout"><source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" type="audio/mpeg"></audio>

    <div id="hacker-tool">
        <div style="font-size:10px; color:var(--blue);">PREDICTOR</div>
        <div id="next-val" style="font-size:24px; font-weight:900; margin: 5px 0;">...</div>
        <button onclick="document.getElementById('hacker-tool').style.display='none'" style="background:#333; color:white; border:none; padding:3px 8px; border-radius:4px; font-size:10px; cursor:pointer;">HIDE</button>
    </div>

    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo-text" id="logo-trigger">AVIATOR PRO</div>
            <div style="display: flex; gap: 5px;">
                <span class="bal-val">₹<span id="bal">0.00</span></span>
                <button onclick="openM('dep-modal')" style="background:var(--green); border:none; color:white; padding:4px 8px; border-radius:5px; font-size:10px; font-weight:bold;">DEP</button>
                <button onclick="openM('wit-modal')" style="background:#444; border:none; color:white; padding:4px 8px; border-radius:5px; font-size:10px; font-weight:bold;">WIT</button>
            </div>
        </div>
        <div class="history-bar" id="history"></div>
    </div>

    <div class="stage" id="stage-box">
        <svg id="chart-svg"><path id="trace-path" d=""></path></svg>
        <div id="loader-container">
            <div id="timer-sec" style="font-size:14px;">5.0s</div>
            <div class="loader-bar-bg"><div id="loader-fill"></div></div>
        </div>
        <div id="multi-text" class="multi">1.00x</div>
        <div id="crash-msg">FLEW AWAY!</div>
        <div id="plane-wrap" class="plane-wrap">✈️</div>
    </div>

    <div class="dual-controls">
        <div class="bet-panel">
            <input type="number" id="bet-amt-1" value="10">
            <button id="btn-bet-1" class="btn-main btn-bet" onclick="handleBet(1)">BET</button>
            <button id="btn-cash-1" class="btn-main btn-cash" onclick="handleCashout(1)">CASH OUT<br><span id="win-1" style="font-size:12px;">0.00</span></button>
        </div>
        <div class="bet-panel">
            <input type="number" id="bet-amt-2" value="10">
            <button id="btn-bet-2" class="btn-main btn-bet" onclick="handleBet(2)">BET</button>
            <button id="btn-cash-2" class="btn-main btn-cash" onclick="handleCashout(2)">CASH OUT<br><span id="win-2" style="font-size:12px;">0.00</span></button>
        </div>
    </div>

    <div id="dep-modal" class="modal">
        <div class="card">
            <h3 style="color:var(--green); margin:0 0 10px 0;">DEPOSIT</h3>
            <div>
                <button id="tab-upi" class="tab-btn active-tab" onclick="switchDep('upi')">UPI</button>
                <button id="tab-ref" class="tab-btn" onclick="switchDep('ref')">REFERRAL</button>
            </div>
            <div id="upi-box">
                <p style="font-size:12px; color:var(--blue);">UPI ID: 8430005800@axl</p>
                <input type="number" id="dep-amt" class="f-in" placeholder="Amount">
                <input type="number" id="utr-in" class="f-in" placeholder="12 Digit UTR Number">
                <button class="btn-main" style="background:var(--green)" onclick="submitDep()">SUBMIT UPI</button>
            </div>
            <div id="ref-box" style="display:none;">
                <input type="text" id="ref-code" class="f-in" placeholder="Enter Referral Code">
                <button class="btn-main" style="background:var(--blue); color:black;" onclick="submitRef()">CLAIM BONUS</button>
            </div>
            <p onclick="closeM()" style="cursor:pointer; margin-top:15px; color:#666; font-size:12px;">CLOSE</p>
        </div>
    </div>

    <div id="wit-modal" class="modal">
        <div class="card">
            <h3 style="color:var(--red); margin:0 0 10px 0;">WITHDRAWAL</h3>
            <input type="number" id="wit-amt" class="f-in" placeholder="Enter Amount">
            <input type="text" id="wit-upi" class="f-in" placeholder="Your UPI ID">
            <button class="btn-main" style="background:var(--red)" onclick="submitWit()">WITHDRAW NOW</button>
            <p onclick="closeM()" style="cursor:pointer; margin-top:15px; color:#666; font-size:12px;">CLOSE</p>
        </div>
    </div>
</div>

<script>
    let wallet = localStorage.getItem('avi_bal') === null ? 0.00 : parseFloat(localStorage.getItem('avi_bal'));
    let historyData = [1.20, 3.50, 1.02];
    let bet1 = { active: false, amt: 10, cashed: false }, bet2 = { active: false, amt: 10, cashed: false };
    let isRunning = false, multi = 1.00, crashAt = 0, tapCount = 0, tapTimer;
    
    const flySnd = document.getElementById('snd-fly');
    const crashSnd = document.getElementById('snd-crash');
    const cashSnd = document.getElementById('snd-cashout');

    function initGame() {
        document.getElementById('audio-unlocker').style.display = 'none';
        flySnd.play().then(() => flySnd.pause());
        crashSnd.play().then(() => crashSnd.pause());
        cashSnd.play().then(() => cashSnd.pause());
        save(); startLoading();
    }

    document.getElementById('logo-trigger').onclick = () => {
        tapCount++; clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 800);
        if(tapCount === 3) { document.getElementById('hacker-tool').style.display = "block"; tapCount = 0; }
    };

    function engine() {
        isRunning = true; multi = 1.00;
        document.getElementById('multi-text').style.display = "block";
        document.getElementById('loader-container').style.display = "none";
        flySnd.currentTime = 0; flySnd.play().catch(e => {});
        let wrap = document.getElementById('plane-wrap');
        let trace = document.getElementById('trace-path');
        let stage = document.getElementById('stage-box');
        wrap.style.display = "block"; updateButtons();

        let startX = stage.clientWidth * 0.05, startY = stage.clientHeight * 0.85;
        let points = `M ${startX} ${startY}`;

        let loop = setInterval(() => {
            multi += 0.012 * Math.sqrt(multi);
            document.getElementById('multi-text').innerText = multi.toFixed(2) + "x";
            let x = Math.min((multi - 1) * 35, stage.clientWidth - 80), y = Math.min((multi - 1) * 20, stage.clientHeight - 120);
            wrap.style.left = (startX + x) + "px"; wrap.style.bottom = (stage.clientHeight * 0.1 + y) + "px";
            points += ` L ${startX + x + 20} ${stage.clientHeight - (stage.clientHeight * 0.1 + y + 30)}`;
            trace.setAttribute('d', points);

            if(bet1.active && !bet1.cashed) document.getElementById('win-1').innerText = "₹" + (bet1.amt * multi).toFixed(2);
            if(bet2.active && !bet2.cashed) document.getElementById('win-2').innerText = "₹" + (bet2.amt * multi).toFixed(2);
            
            if(multi >= crashAt) {
                clearInterval(loop); isRunning = false; flySnd.pause(); crashSnd.play();
                document.getElementById('multi-text').style.display = "none";
                document.getElementById('crash-msg').style.display = "block";
                wrap.style.display = "none"; trace.setAttribute('d', ''); 
                historyData.push(parseFloat(crashAt)); save(); setTimeout(startLoading, 2000);
            }
        }, 80);
    }

    function startLoading() {
        bet1.active = bet2.active = bet1.cashed = bet2.cashed = false;
        document.getElementById('crash-msg').style.display = "none";
        document.getElementById('loader-container').style.display = "flex";
        updateButtons();
        crashAt = (Math.random() < 0.6 ? (Math.random()*0.8 + 1.1) : (Math.random()*4 + 2.1)).toFixed(2);
        document.getElementById('next-val').innerText = crashAt + "x";
        let timeLeft = 50;
        let tLoop = setInterval(() => {
            timeLeft--;
            document.getElementById('loader-fill').style.width = (timeLeft * 2) + "%";
            document.getElementById('timer-sec').innerText = (timeLeft / 10).toFixed(1) + "s";
            if(timeLeft <= 0) { clearInterval(tLoop); engine(); }
        }, 100);
    }

    function handleBet(id) { 
        let amt = parseFloat(document.getElementById('bet-amt-'+id).value);
        let b = (id === 1 ? bet1 : bet2);
        if(!isRunning && !b.active && wallet >= amt) { wallet -= amt; b.amt = amt; b.active = true; save(); updateButtons(); }
        else if(!isRunning && !b.active && wallet < amt) { alert('Insufficient Balance!'); }
    }

    function handleCashout(id) { 
        let b = (id === 1 ? bet1 : bet2); 
        if(isRunning && b.active && !b.cashed) { b.cashed = true; wallet += (b.amt * multi); cashSnd.currentTime = 0; cashSnd.play(); save(); updateButtons(); } 
    }

    function updateButtons() {
        for(let i=1; i<=2; i++) {
            let b = (i === 1 ? bet1 : bet2);
            let btn = document.getElementById('btn-bet-'+i), cash = document.getElementById('btn-cash-'+i);
            if(isRunning) { btn.style.display = "none"; cash.style.display = (b.active && !b.cashed) ? "block" : "none"; }
            else { btn.style.display = "block"; cash.style.display = "none"; btn.innerText = b.active ? "CANCEL" : "BET"; btn.style.background = b.active ? "#444" : "var(--green)"; }
        }
    }

    function save() {
        document.getElementById('bal').innerText = wallet.toFixed(2);
        localStorage.setItem('avi_bal', wallet.toFixed(2));
        let h = document.getElementById('history'); h.innerHTML = '';
        historyData.slice(-8).reverse().forEach(v => { h.innerHTML += `<div class="h-item" style="color:${v>=2?'var(--blue)':'var(--red)'}">${v}x</div>`; });
    }

    function openM(id){ document.getElementById(id).style.display="flex"; }
    function closeM(){ document.querySelectorAll('.modal').forEach(m => m.style.display="none"); }
    
    function switchDep(type) {
        document.getElementById('upi-box').style.display = type === 'upi' ? 'block' : 'none';
        document.getElementById('ref-box').style.display = type === 'ref' ? 'block' : 'none';
        document.getElementById('tab-upi').className = 'tab-btn' + (type === 'upi' ? ' active-tab' : '');
        document.getElementById('tab-ref').className = 'tab-btn' + (type === 'ref' ? ' active-tab' : '');
    }

    function submitDep() { 
        let amt = parseFloat(document.getElementById('dep-amt').value);
        let utr = document.getElementById('utr-in').value;
        if(amt > 0 && utr.length === 12) { 
            closeM(); 
            alert('Request Sent! Your deposit will be approved in 30 minutes after verification.'); 
        } else if(utr.length !== 12) {
            alert('Invalid UTR! Please enter a 12-digit UTR number.');
        } else {
            alert('Please enter a valid amount.');
        }
    }

    function submitRef() {
        let code = document.getElementById('ref-code').value;
        if(code === "Maaj") { wallet += 49; save(); closeM(); alert('Referral Bonus ₹49 Added!'); }
        else { alert('Invalid Code!'); }
    }

    function submitWit() {
        let amt = parseFloat(document.getElementById('wit-amt').value);
        if(amt > 0 && amt <= wallet && document.getElementById('wit-upi').value.length > 5) { 
            wallet -= amt; save(); closeM(); alert('Withdrawal Request Sent!'); 
        } else if(amt > wallet) {
            alert('Insufficient Balance!');
        } else { 
            alert('Invalid Amount or UPI ID!'); 
        }
    }
</script>
</body>
</html>
